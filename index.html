<!DOCTYPE html>
<html>
<head>
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Weather Dashboard</h1>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
